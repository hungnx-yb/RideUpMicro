spring:
  application:
    name: payment-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/payment_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Hung23072004}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: rideupmicroredis-hung2307xuan-bff7.f.aivencloud.com
      port: 27742
      username: default
      password: AVNS_w8vWRSdFiTovQJ277R8
      timeout: 10s
      ssl:
        enabled: true

  cache:
    type: redis


  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_GROUP_PAYMENT:payment-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8085
  servlet:
    context-path: /api/payment

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}

app:
  kafka:
    topics:
      payment-requested: ${KAFKA_TOPIC_PAYMENT_REQUESTED:booking.payment.requested}
      payment-completed: ${KAFKA_TOPIC_PAYMENT_COMPLETED:payment.completed}
      payment-failed: ${KAFKA_TOPIC_PAYMENT_FAILED:payment.failed}
      booking-cancell-request: ${KAFKA_TOPIC_BOOKING_CANCELL_REQUEST:booking.cancell.request}
      refund-completed: ${KAFKA_TOPIC_REFUND_COMPLETED:refund.completed}
vnpay:
  pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payments/vnpay-result}
  tmn-code: ${VNPAY_TMN_CODE:GQ9S08FR}
  secret-key: ${VNPAY_SECRET_KEY:0X3LM1OM4UT9ELU96UJ9T2W6T57P3RAP}
  version: ${VNPAY_VERSION:2.1.0}
  command: ${VNPAY_COMMAND:pay}
  order-type: ${VNPAY_ORDER_TYPE:other}
  locale: ${VNPAY_LOCALE:vn}
  currency: ${VNPAY_CURRENCY:VND}
  expire-minutes: ${VNPAY_EXPIRE_MINUTES:15}
  refund-url: ${VNPAY_REFUND_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
