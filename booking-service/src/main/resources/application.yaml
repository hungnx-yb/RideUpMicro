spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:mysql://localhost:3306/booking_service_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: Hung23072004
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  data:
    redis:
      host: rideupmicroredis-hung2307xuan-bff7.f.aivencloud.com
      port: 27742
      username: default
      password: AVNS_w8vWRSdFiTovQJ277R8
      timeout: 10s
      ssl:
        enabled: true
  cache:
    type: redis

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${KAFKA_GROUP_BOOKING:booking-service-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8084
  servlet:
    context-path: /api/booking

jwt:
  signerKey: S5eUx6DQSJ3ce3Dokj+qZmVlpj3hG7M841wX3NEj3oMcPwx6+oOA9AdHzbZE3Nb84
  valid-duration: 36000
  refreshable-duration: 360000

expiryTime: 1200

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

app:
  frontend-base-url: http://localhost:5173
  kafka:
    topics:
      payment-requested: ${KAFKA_TOPIC_PAYMENT_REQUESTED:booking.payment.requested}
      payment-completed: ${KAFKA_TOPIC_PAYMENT_COMPLETED:payment.completed}
      payment-failed: ${KAFKA_TOPIC_PAYMENT_FAILED:payment.failed}
      booking-confirmed: ${KAFKA_TOPIC_BOOKING_CONFIRMED:booking.confirmed}
      booking-cancelled: ${KAFKA_TOPIC_BOOKING_CANCELLED:booking.cancelled}
      booking-cancell-request: ${KAFKA_TOPIC_BOOKING_CANCELL_REQUEST:booking.cancell.request}

booking:
  expire:
    fixed-delay-ms: 30000

location:
  seeding:
    enabled: true
    max-retries: 3
    initial-backoff-ms: 1500