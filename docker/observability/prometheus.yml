global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "discovery-server"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8761"]

  - job_name: "identity-service"
    metrics_path: /api/identity/actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]

  - job_name: "location-service"
    metrics_path: /api/location/actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: "trip-service"
    metrics_path: /api/trip/actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]

  - job_name: "booking-service"
    metrics_path: /api/booking/actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]

  - job_name: "payment-service"
    metrics_path: /api/payment/actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8085"]


  - job_name: "notification-service"
    metrics_path: /api/notification/actuator/prometheus
    static_configs:
      - targets: [ "host.docker.internal:8086" ]


  - job_name: "chat-service"
    metrics_path: /api/chat/actuator/prometheus
    static_configs:
      - targets: [ "host.docker.internal:8087" ]