server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway

  data:
    redis:
      host: rideupmicroredis-hung2307xuan-bff7.f.aivencloud.com
      port: 27742
      username: default
      password: AVNS_w8vWRSdFiTovQJ277R8
      timeout: 10s
      ssl:
        enabled: true

  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/api/identity/**

        - id: location-service
          uri: lb://location-service
          predicates:
            - Path=/api/location/**


        - id: trip-service
          uri: lb://trip-service
          predicates:
            - Path=/api/trip/**

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/booking/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**

      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

